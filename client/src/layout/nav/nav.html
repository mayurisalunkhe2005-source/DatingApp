<header class="p-3 w-full fixed top-0 z-50 bg-linear-to-r from-primary to-black">
    <div class="flex flex-col px-10 gap-10 md:flex-row md:items-center text-white">
        <a class=" flex items-left  gap-3 max-h-16 text-white border-r-white border-r-2 pr-6"> </a>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
            <path
                d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z" />
        </svg>

        <h3 class="text-2xl font-semibold text-white">DATING APP</h3>
        <div class="h-8 border-2 border-white"></div>
        <nav class="flex gap-3 text-white" border-r-white border-r-2 pr-6>
            <a>MATCHES</a>
            <a>LISTS</a>
            <a>MESSAGES</a>
        </nav>
        <div class="flex align-middle ml-auto gap-3 text-black h-8 border-r-2 ">
            @if (accountService.currentUser();as user){
            <!-- change popover-1 and --anchor-1 names. Use unique names for each dropdown -->
            <div class="dropdown dropdown-end" >
                <div tabindex="0" class="flex items-center gap-3 text-white text-xl cursor-pointer" role="button"></div>
                <img src="/user.png" alt="user avatar" class="w-8 h-8 rounded-full" />
                <span>{{ user.displayName }}</span>

            </div>

                <ul tabindex="0" class="dropdown-content menu w-52 rounded-box bg-base-100 shadow-sm" role="menu">
                <li><a>Edit Profile</a></li>
                <li><a (click)="logout()">Logout</a></li>
            </ul>

            } @else {
                 <form #LoginForm="ngForm" (ngSubmit)="login()" class="flex items-center gap-3">
                <input [(ngModel)]="creds.email" name="email" type="text" placeholder="Enter Email" class="input">
                <input [(ngModel)]="creds.password" name="password" type="password" placeholder="Enter Password"
                    class="input">
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            }
           

        </div>
    </div>
</header>
